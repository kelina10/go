 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goopedia Ultra</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#fff;
}

main{
  padding:20px;
  padding-bottom:80px;
}

#title{
  font-size:20px;
  margin-bottom:10px;
}

#content{
  line-height:1.7;
  white-space:pre-wrap;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-around;
}

.footer input{
  width:40%;
  padding:8px;
  border-radius:20px;
  border:1px solid #ddd;
}

button{
  background:none;
  border:none;
  font-size:18px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:280px;
  height:100%;
  background:#fff;
  border-right:1px solid #ddd;
  transition:.3s;
  overflow:auto;
  padding:15px;
}

.sidebar.open{ left:0; }

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
}

.overlay.show{ display:block; }
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
  <h3>📚 Índice</h3>
  <div id="chapters"></div>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<main>
  <div id="title">Cargando...</div>
  <div id="content"></div>
</main>

<div class="footer">

  <button onclick="toggleMenu()">☰</button>

  <input id="search" placeholder="Buscar..." oninput="searchText()">

  <button onclick="speak()">🔊</button>

  <button onclick="download()">⬇️</button>

</div>

<script src="app.js"></script>

</body>
</html>
